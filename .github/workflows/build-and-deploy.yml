name: Build and Deploy Hugo Site to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests
        run: pytest tests/unit/ tests/test_infrastructure.py -v -m unit

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.125.0' # Change this if you use a different Hugo version

      - name: Setup data directory
        run: mkdir -p data

      - name: Fetch Medium feed
        run: python3 scripts/fetch_medium.py --username adhungel2 --out data/medium.json

      - name: Fetch Dev.to articles
        run: python3 scripts/fetch_devto.py --username ajaydhungel23 --out data/devto.json

      - name: Fetch Credly badges
        run: python3 scripts/fetch_credly.py --user ajay-dhungel.7261bfe6 --out data/credly.json

      - name: Fetch GitHub projects
        run: |
          python3 scripts/fetch_github.py --user ajaydhungel7 --out data/github.json \
            --pin flask-azure-k8s aws-cdk-chatbot railsflow-ci rubyrana

      - name: Build Hugo site
        run: hugo --environment production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          audience: sts.amazonaws.com
          role-to-assume: arn:aws:iam::544234170512:role/GithubRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3 bucket
        run: |
          aws s3 sync public/ s3://ajaydhungel.me/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
