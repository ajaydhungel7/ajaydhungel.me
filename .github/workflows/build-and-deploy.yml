name: Build and Deploy Hugo Site to S3

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests
        run: pytest tests/unit/ tests/test_infrastructure.py -v -m unit

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3.0.0
        with:
          hugo-version: '0.125.0'

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Setup data directory
        run: mkdir -p data

      - name: Fetch Medium feed
        run: python3 scripts/fetch_medium.py --username adhungel2 --out data/medium.json

      - name: Fetch Dev.to articles
        run: python3 scripts/fetch_devto.py --username ajaydhungel23 --out data/devto.json

      - name: Fetch Credly badges
        run: python3 scripts/fetch_credly.py --user ajay-dhungel.7261bfe6 --out data/credly.json

      - name: Fetch GitHub projects
        run: |
          python3 scripts/fetch_github.py --user ajaydhungel7 --out data/github.json \
            --pin flask-azure-k8s aws-cdk-chatbot railsflow-ci rubyrana

      - name: Run integration tests
        run: pytest tests/integration/ -v

      - name: Build Hugo site
        run: hugo --environment production --buildFuture

      - name: Upload site artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: hugo-site
          path: public/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4.3.0
        with:
          name: hugo-site
          path: public/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3 bucket
        run: |
          test -f public/index.html || (echo "public/index.html missing — aborting sync" && exit 1)
          aws s3 sync public/ s3://ajaydhungel.me/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
